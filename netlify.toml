[build]
  publish = "."
  functions = "netlify/functions"

# Disable secrets scanning — Supabase anon/publishable keys are safe to be public
[build.environment]
  SECRETS_SCAN_ENABLED = "false"

# API routes → Netlify functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# After Stripe payment success → app
[[redirects]]
  from = "/success"
  to = "/app.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[functions]
  node_bundler = "esbuild"
